name: CloudTech Project CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push selected services
        run: |
          for service in vote result worker; do
            docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/$service:latest ./$service
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/$service:latest
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update docker-compose.yml
        run: |
          # Цей варіант sed захоплює пробіли на початку рядка (^\s*) 
          # і використовує їх при заміні (\1), зберігаючи структуру YAML.
          
          # Для vote [cite: 103]
          sed -i 's|^\([[:space:]]*\)build:.*vote.*|\1image: ${{ secrets.ACR_LOGIN_SERVER }}/vote:latest|g' docker-compose.yml
          sed -i 's|^\([[:space:]]*\)image: .*vote.*|\1image: ${{ secrets.ACR_LOGIN_SERVER }}/vote:latest|g' docker-compose.yml
          
          # Для result [cite: 103]
          sed -i 's|^\([[:space:]]*\)build:.*result.*|\1image: ${{ secrets.ACR_LOGIN_SERVER }}/result:latest|g' docker-compose.yml
          sed -i 's|^\([[:space:]]*\)image: .*result.*|\1image: ${{ secrets.ACR_LOGIN_SERVER }}/result:latest|g' docker-compose.yml
          
          # Для worker [cite: 103]
          sed -i 's|^\([[:space:]]*\)build:.*worker.*|\1image: ${{ secrets.ACR_LOGIN_SERVER }}/worker:latest|g' docker-compose.yml
          sed -i 's|^\([[:space:]]*\)image: .*worker.*|\1image: ${{ secrets.ACR_LOGIN_SERVER }}/worker:latest|g' docker-compose.yml

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/"

      - name: Execute remote deploy commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
