name: CloudTech Project CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push selected services
        run: |
          for service in vote result worker; do
            docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/$service:latest ./$service
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/$service:latest
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update docker-compose.yml
        run: |
          # 1. Видаляємо всі старі рядки build та image для наших сервісів 
          # Це очистить конфігурацію від застарілих шляхів.
          sed -i '/build:.*vote/d' docker-compose.yml
          sed -i '/image:.*vote/d' docker-compose.yml
          sed -i '/build:.*result/d' docker-compose.yml
          sed -i '/image:.*result/d' docker-compose.yml
          sed -i '/build:.*worker/d' docker-compose.yml
          sed -i '/image:.*worker/d' docker-compose.yml

          # 2. Вставляємо один правильний рядок image відразу після назви сервісу [cite: 103]
          # Ми використовуємо 4 пробіли для відступу, щоб зберегти структуру YAML.
          sed -i '/vote:/a \    image: ${{ secrets.ACR_LOGIN_SERVER }}/vote:latest' docker-compose.yml
          sed -i '/result:/a \    image: ${{ secrets.ACR_LOGIN_SERVER }}/result:latest' docker-compose.yml
          sed -i '/worker:/a \    image: ${{ secrets.ACR_LOGIN_SERVER }}/worker:latest' docker-compose.yml
          
          # 3. Перевірка: виводимо файл у лог GitHub Actions, щоб побачити результат
          echo "--- Оновлений docker-compose.yml ---"
          cat docker-compose.yml

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/"

      - name: Execute remote deploy commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
